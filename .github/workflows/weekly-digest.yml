name: Weekly Job Digest

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          PAGES_URL: https://pbizzle123.github.io/Job-Search-Digest/
        run: python digest.py

      - name: Commit and push job listings page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly job listings page"
          file_pattern: docs/index.html data/seen_jobs.json
